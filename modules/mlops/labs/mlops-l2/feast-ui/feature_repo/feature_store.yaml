project: spaceflight_project
registry:
    registry_type: sql
    path: postgresql+psycopg://user:password@postgres:5432/spaceflight_db
    cache_ttl_seconds: 60
provider: local

offline_store:
  type: postgres
  host: postgres
  port: 5432
  database: spaceflight_db
  db_schema: public
  user: user
  password: password

online_store:
  type: postgres
  host: postgres        # nome servizio docker compose
  port: 5432
  database: spaceflight_db # o lo stesso db, ma meglio separato
  user: user
  password: password
  db_schema: online     # opzionale, per tenerlo separato


entity_key_serialization_version: 3
auth:
   type: no_auth

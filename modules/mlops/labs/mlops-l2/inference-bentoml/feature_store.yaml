project: spaceflight_project
registry: s3://features/registry.db
provider: local
aws_endpoint_override: http://minio:9000
minio_access_key: minioadmin
minio_secret_key: minioadmin
registry_store:
    type: s3
    path: s3://features/registry.db

offline_store:
  type: postgres
  host: postgres
  port: 5432
  database: spaceflight_db
  db_schema: public
  user: user
  password: password

entity_key_serialization_version: 3
auth:
   type: no_auth
